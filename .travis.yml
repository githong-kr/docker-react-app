sudo: required

language: generic

services:
  - docker

before_install:
  - echo "start Creating an image with dockerfile"
  - docker build -t bale/docker-react-app -f Dockerfile.dev .

script:
  - docker run -e CI=true bale/docker-react-app npm run test -- --coverage

deploy:
  provider: elasticbeanstalk
  region: "ap-northeast-2"
  app: "new-docker-react-app"
  env: "NewDockerReactApp-env"
  bucket_name: "elasticbeanstalk-ap-northeast-2-768957609160"
  bucket_path: "new-docker-react-app"
  on:
    branch: master
  access_key_id: $AWS_ACCESS_KEY
  secret_access_key: $AWS_SECRET_ACCESS_KEY